[build]
builder = "NIXPACKS"
buildCommand = "npm run build"

[deploy]
startCommand = "node dist/cli.js --transport http --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[variables]
POSTGRES_TOOL_FILTER = "pg_read_query,pg_list_tables,pg_describe_table,pg_list_schemas,pg_list_views,pg_list_functions,pg_list_triggers,pg_list_constraints,-codemode"
